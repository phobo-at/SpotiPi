<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <title>SpotiPi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="preload" href="{{ url_for('static', filename='dist/app.css', v=frontend_asset_version) }}" as="style">
  <link rel="modulepreload" href="{{ url_for('static', filename='dist/app.js', v=frontend_asset_version) }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='dist/app.css', v=frontend_asset_version) }}">

  <!-- PWA Icons & Manifest -->
  <link rel="icon" href="{{ url_for('static', filename='icons/icon-pwa-dark-180.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-pwa-dark-180.png') }}">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">

  <!-- iOS / Android Web App Meta -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SpotiPi">
  <meta name="theme-color" content="#1db954">

  <meta name="description" content="Wake up to your favorite music and fall asleep with Spotify sleep timer">
</head>
<body>
  <div id="app-root"></div>
  <noscript>
    <main style="padding: 2rem; color: #f5f7fb; background: #0c1016; min-height: 100vh; font-family: 'Avenir Next', 'Segoe UI', sans-serif;">
      <h1>SpotiPi</h1>
      <p>This interface needs JavaScript enabled.</p>
      <p>Open the app on a modern browser to manage alarm, sleep and playback.</p>
    </main>
  </noscript>
  <script id="spotipi-bootstrap" type="application/json">{{ bootstrap | tojson }}</script>
  <script defer type="module" src="{{ url_for('static', filename='dist/app.js', v=frontend_asset_version) }}"></script>
</body>
</html>
